<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Piano" />
  <title>Piano</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="start-overlay" id="startOverlay">
  <div class="overlay-logo">Pocket<span>Piano</span></div>
  <button class="start-btn" id="startBtn">Tap to Play</button>
  <div class="overlay-sub">tap to enable audio</div>
</div>

<div class="header">
  <div class="logo">Pocket<span>Piano</span></div>
  <div class="pr-badge" id="prBadge"></div>
</div>
<div class="hint">scroll to explore all keys</div>

<div class="piano-wrapper">
  <div class="lid"></div>
  <div class="keyboard-scroll" id="keyboardScroll">
    <div class="keyboard" id="keyboard">
      <div class="black-keys-layer" id="blackKeysLayer"></div>
    </div>
  </div>
  <div class="rail"></div>
</div>

<script type="module">
  import { initAudio } from './audio.js';
  import { buildKeyboard } from './keyboard.js';

  buildKeyboard();

  (async () => {
    try {
      const repo = 'msdrey/PocketPiano';
      const deps = await fetch(`https://api.github.com/repos/${repo}/deployments?environment=github-pages&per_page=5`).then(r => r.json());
      for (const dep of deps) {
        const statuses = await fetch(dep.statuses_url).then(r => r.json());
        if (statuses[0]?.state !== 'success') continue;
        const prs = await fetch(`https://api.github.com/repos/${repo}/commits/${dep.sha}/pulls`,
          { headers: { Accept: 'application/vnd.github+json' } }).then(r => r.json());
        if (Array.isArray(prs) && prs[0]) {
          document.getElementById('prBadge').textContent = '#' + prs[0].number;
        }
        break;
      }
    } catch (e) {}
  })();

  document.getElementById('startBtn').addEventListener('click', () => {
    initAudio().then(() => {
      document.getElementById('startOverlay').classList.add('hidden');
    });
  });
</script>
</body>
</html>
