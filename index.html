<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Piano" />
  <title>Piano</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="start-overlay" id="startOverlay">
  <div class="overlay-logo">Pocket<span>Piano</span></div>
  <button class="start-btn" id="startBtn">Tap to Play</button>
  <div class="overlay-sub">tap to enable audio</div>
</div>

<div class="header">
  <div class="logo">Pocket<span>Piano</span></div>
</div>
<div class="hint">scroll to explore all keys</div>

<div class="piano-wrapper">
  <div class="lid"></div>
  <div class="keyboard-scroll" id="keyboardScroll">
    <div class="keyboard" id="keyboard">
      <div class="black-keys-layer" id="blackKeysLayer"></div>
    </div>
  </div>
  <div class="rail"></div>
</div>

<script type="module">
  import { initAudio } from './audio.js';
  import { buildKeyboard } from './keyboard.js';

  buildKeyboard();

  document.getElementById('startBtn').addEventListener('click', () => {
    initAudio().then(() => {
      document.getElementById('startOverlay').classList.add('hidden');
    });
  });
</script>
</body>
</html>
