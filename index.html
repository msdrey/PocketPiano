<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Piano" />
  <title>Piano</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Courier+Prime&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.png" />
</head>
<body>

<div class="header">
  <div class="logo">Pocket<span>Piano</span></div>
  <div class="header-right">
    <div class="volume-control">
      <svg class="volume-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
        <path d="M2 5h3l4-3v12l-4-3H2z" />
        <path d="M11 4.5a5 5 0 0 1 0 7" fill="none" stroke-width="1.5" stroke-linecap="round" />
      </svg>
      <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="100" />
    </div>
    <div class="transpose-controls">
      <button id="transposeDown" class="transpose-btn">−</button>
      <span id="transposeValue" class="transpose-value">0</span>
      <button id="transposeUp" class="transpose-btn">+</button>
    </div>
    <div class="qt-toggle-wrapper">
      <span class="qt-toggle-label">¼</span>
      <button id="qtToggle" class="qt-toggle-btn" aria-label="Toggle quarter tones" aria-pressed="false"></button>
    </div>
    <div class="pr-badge" id="prBadge"></div>
  </div>
</div>

<div class="piano-wrapper">
  <div class="lid"></div>
  <div class="keyboard-scroll" id="keyboardScroll">
    <div class="keyboard" id="keyboard">
      <div class="quarter-tone-layer" id="quarterToneLayer" style="display:none"></div>
      <div class="black-keys-layer" id="blackKeysLayer"></div>
    </div>
  </div>
  <div class="rail">
    <input type="range" class="scroll-slider" id="scrollSlider" min="0" max="1000" value="0" />
  </div>
</div>

<section id="warmup-section">
  <div class="warmup-title">Vocal Warm‑Up</div>
  <div class="warmup-row">
    <select id="warmupVoice" class="warmup-select warmup-voice-select">
      <option value="bass">Bass  (E2 – E4)</option>
      <option value="baritone">Baritone  (A2 – A4)</option>
      <option value="tenor">Tenor  (C3 – C5)</option>
      <option value="alto">Alto  (F3 – F5)</option>
      <option value="mezzo">Mezzo-soprano  (A3 – A5)</option>
      <option value="soprano">Soprano  (C4 – C6)</option>
      <option value="custom">Custom</option>
    </select>
  </div>
  <div class="warmup-row">
    <span class="warmup-label">From</span>
    <select id="warmupLowest" class="warmup-select"></select>
    <span class="warmup-label">To</span>
    <select id="warmupHighest" class="warmup-select"></select>
  </div>
  <div class="warmup-row">
    <select id="warmupPattern" class="warmup-select warmup-pattern-select">
      <option value="arpeggio">Arpeggio (1–3–5–8–5–3–1)</option>
      <option value="scale">Do Re Mi (1–2–3–4–5–4–3–2–1)</option>
      <option value="triad">Triad (1–3–5–3–1)</option>
    </select>
  </div>
  <div class="warmup-row warmup-tempo-row">
    <button id="warmupBpmDown" class="warmup-ctrl-btn">−</button>
    <span id="warmupBpmDisplay" class="warmup-bpm-display">80 BPM</span>
    <button id="warmupBpmUp" class="warmup-ctrl-btn">+</button>
  </div>
  <div class="warmup-row warmup-transport">
    <button id="warmupRestart" class="warmup-transport-btn">↺</button>
    <button id="warmupPlayPause" class="warmup-transport-btn warmup-play-btn">▶</button>
  </div>
</section>

<script type="module">
  import { buildKeyboard } from './src/keyboard.js';
  import { initTransposeControls } from './src/transpose.js';
  import { initVolumeControl } from './src/volume.js';
  import { initWarmup } from './src/warmup.js';
  import { initQuarterTone } from './src/quartertone.js';

  buildKeyboard();
  initTransposeControls();
  initVolumeControl();
  initWarmup();
  initQuarterTone();

  fetch('/pr.json')
    .then(r => r.json())
    .then(({ pr }) => { if (pr) document.getElementById('prBadge').textContent = '#' + pr; })
    .catch(() => {});

  if ('serviceWorker' in navigator) {
    // updateViaCache:'none' ensures the SW script is always fetched from the network,
    // never from the browser's HTTP cache, so new deploys are detected immediately.
    navigator.serviceWorker.register('/serviceWorker.js', { type: 'module', updateViaCache: 'none' })
      .then(reg => reg.update()); // proactively check for an updated SW on every page load

    // When a new SW takes control (skipWaiting + clients.claim), reload so the page
    // gets fresh JS modules rather than running stale in-memory code.
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!reloading) { reloading = true; window.location.reload(); }
    });
  }
</script>
</body>
</html>
